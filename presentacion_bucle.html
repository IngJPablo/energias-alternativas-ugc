            box-sizing: border-box;
        }

            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: default;
            transition: cursor 0.3s ease;
        }

        .hide-cursor {
            cursor: none !important;
        }

        .presentation-container {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #101625 0%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;

        /* 📺 MARCO DE TV PREMIUM SATINADO */
        .tv-frame {
            position: relative;
            width: 95vw;
            max-width: 1420px;
            background: #182030;
            border: 14px solid #222c40;
            border-radius: 36px;
            box-shadow:

            display: flex;
            flex-direction: column;
            overflow: hidden;

        /* 🖥️ PANTALLA DIGITAL COMPLETA: 100% VIDEO CON HUD FLOTANTE */
        .tv-screen {

            width: 100%;

            background-color: #05080f;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            display: flex;
            flex-direction: row;

        /* Contenedor del Video (100% tras HUD flotante) */

            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            border-right: none;

        .slide-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 5;
            transition: opacity 0.75s cubic-bezier(0.25, 1, 0.5, 1);

            height: auto;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));

            top: 24px;
            left: 24px;
            width: 270px;
            height: auto;
            max-height: calc(100% - 48px);
            background: rgba(10, 16, 28, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 210, 220, 0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 25;
            box-shadow:

                inset 0 0 20px rgba(0, 210, 220, 0.05);
            overflow-y: auto;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;

            margin-top: 2px;

            border-radius: 10px;
            padding: 8px 12px;

            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2.5px;
            background-color: var(--accent-color, #00d2dc);
            box-shadow: 0 0 6px var(--accent-color, #00d2dc);

        .metric-label {

            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;

            align-items: baseline;

        .metric-value {

                0 0 16px rgba(0, 210, 220, 0.6);

            0%, 100% {

            50% {

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;

            opacity: 1;

                    accent: '#00d2dc',
                    metricas: [
                        { label: 'Viento Ambiental', value: 3.22, variacion: 0.15, unit: ' m/s', precision: 2 },
                        { label: 'Viento Venturi', value: 6.44, variacion: 0.28, unit: ' m/s', precision: 2 },
                        { label: 'Generación Eólica', value: 3.02, variacion: 0.11, unit: ' kW', precision: 2 }
                    ],
                    grafico: 'eolica_waves'
                },
                {
                    titulo: 'PROTOTIPO MAQUETA',
                    subtitulo: 'ESTRUCTURA INTEGRADA',
                    accent: '#10b981',
                    metricas: [
                        { label: 'Escala Física', value: 'Prototipo 1:50', unit: '', static: true },
                        { label: 'Material Estructural', value: 'Madera & PETG', unit: '', static: true },
                        { label: 'Integración SCADA', value: 'ESP32 IoT Central', unit: '', static: true }
                    ],
                    grafico: 'maqueta'
                },
                {
                    titulo: 'MAQUETA FÍSICA',
                    subtitulo: 'RED DE MONITOREO SENSORIAL',
                    accent: '#10b981',
                    metricas: [
                        { label: 'Iluminación Activa', value: 'MicroLED de Precisión', unit: '', static: true },
                        { label: 'Sensores de Campo', value: 'Temp, Humedad, CO₂', unit: '', static: true },
                        { label: 'Comunicación', value: 'WiFi - Protocolo MQTT', unit: '', static: true }
                    ],
                    grafico: 'maqueta_detail'
                },
                {
                    titulo: 'MAQUETA ACÚSTICA',
                    subtitulo: 'VENTILACIÓN Y CONFORT',
                    accent: '#86efac',
                    metricas: [
                        { label: 'Arquitectura', value: 'Atrio Central Activo', unit: '', static: true },
                        { label: 'Renovación de Aire', value: 'Cruzada Pasiva', unit: '', static: true },
                        { label: 'Estudio Fluidos CFD', value: 'Simulado en Revit/CFD', unit: '', static: true }
                    ],
                    grafico: 'maqueta_dron'
                },
                {
                    titulo: 'TELEMETRÍA INTERIOR',
                    subtitulo: 'CONFORT FÍSICO DE CABINAS',
                    accent: '#86efac',
                    metricas: [
                        { label: 'Temperatura Interior', value: 19.4, variacion: 0.15, unit: ' °C', precision: 1 },
                        { label: 'Humedad Relativa', value: 54.8, variacion: 0.3, unit: ' %', precision: 1 },
                        { label: 'Concentración CO₂', value: 382, variacion: 3, unit: ' ppm', precision: 0 }
                    ],
                    grafico: 'maqueta_sensors'
                }
            ];

            let currentSlide = 0;
            const totalSlides = videoClips.length;

            // Elementos del DOM
            const video1 = document.getElementById('video1');
            const video2 = document.getElementById('video2');
            const container = document.getElementById('presentationContainer');
            const playOverlay = document.getElementById('playOverlay');
            const overlayPlayBtn = document.getElementById('overlayPlayBtn');
            const statusIndicator = document.getElementById('statusIndicator');
            const progressBar = document.getElementById('progressBar');
            
            // Elementos del Panel SCADA
            const scadaTitle = document.getElementById('scadaTitle');
            const scadaSubtitle = document.getElementById('scadaSubtitle');
            const scadaMetricsContainer = document.getElementById('scadaMetrics');
            const scadaVisualizer = document.getElementById('scadaVisualizer');
            const hudToggleBtn = document.getElementById('hudToggleBtn');

            let activePlayer = video1;
            let inactivePlayer = video2;
            let isTransitioning = false;
            let statusTimeout;
            let telemetryInterval;
            let animationFrameId;

            // Instancia de datos dinámicos actuales para fluctuación
            let currentTelemetryValues = [];

            // ============================================================
            // 🔄 MOTOR DE NAVEGACIÓN Y CARGA DUAL (CROSS-FADE)
            // ============================================================
            function goToSlide(index) {
                if (index < 0 || index >= totalSlides || isTransitioning) return;

                isTransitioning = true;
                currentSlide = index;
                const nextVideoUrl = videoClips[index];

                // Limpiar barra de progreso
                progressBar.style.width = '0%';

                // Preparar el reproductor inactivo en segundo plano
                inactivePlayer.src = nextVideoUrl;
                inactivePlayer.load();
                inactivePlayer.muted = true; // Estrictamente silenciado

                inactivePlayer.play().then(() => {
                    // Hacer la transición de fundido cruzado:
                    inactivePlayer.classList.add('active');
                    activePlayer.classList.remove('active');

                    // Intercambiar las referencias de reproductores
                    const temp = activePlayer;
                    activePlayer = inactivePlayer;
                    inactivePlayer = temp;

                    // Desvincular eventos de timeupdate del reproductor viejo
                    inactivePlayer.ontimeupdate = null;

                    // Vincular seguimiento de progreso al nuevo reproductor activo
                    setupProgressTracker(activePlayer);

                    // Apagar el reproductor viejo tras completar la transición de opacidad (0.75s)
                    setTimeout(() => {
                        inactivePlayer.pause();
                        inactivePlayer.src = ""; // Liberar memoria
                        isTransitioning = false;
                    }, 750);
                }).catch(err => {
                    console.log("El navegador bloqueó el autoplay. Requiere interacción inicial.");
                    playOverlay.classList.add('visible');
                    isTransitioning = false;
                });

                // Actualizar la Consola SCADA para la diapositiva actual
                updateScadaPanel(index);
            }

            // ============================================================
            // ⏳ LÓGICA DE BARRA DE PROGRESO DE DIAPOSITIVA ACTUAL
            // ============================================================
            function setupProgressTracker(player) {
                player.ontimeupdate = () => {
                    if (player.duration) {
                        const percent = (player.currentTime / player.duration) * 100;
                        progressBar.style.width = `${percent}%`;
                    }
                };
            }

            // ============================================================
            // 🔄 EVENTO ENDED: AVANCE AUTOMÁTICO EN BUCLE INFINITO
            // ============================================================
            function handleVideoEnded() {
                if (isTransitioning) return;
                
                // Si llegamos al último video, volvemos a empezar en 0. De lo contrario, avanzamos 1.
                const nextSlide = (currentSlide < totalSlides - 1) ? (currentSlide + 1) : 0;
                goToSlide(nextSlide);
            }

            // Suscribir eventos ended a ambos reproductores
            video1.addEventListener('ended', handleVideoEnded);
            video2.addEventListener('ended', handleVideoEnded);

            // ============================================================
            // 📊 MOTOR DE CONSOLA SCADA: RENDERIZACIÓN Y DINAMISMO EN VIVO
            // ============================================================
            function updateScadaPanel(index) {
                const data = scadaDatabase[index];
                
                // Actualizar títulos
                scadaTitle.textContent = data.titulo;
                scadaSubtitle.textContent = data.subtitulo;
                scadaTitle.style.color = data.accent;
                scadaTitle.style.textShadow = `0 0 8px ${data.accent}66`;

                // Detener intervalos y animaciones viejos
                clearInterval(telemetryInterval);
                cancelAnimationFrame(animationFrameId);

                // Inicializar las métricas
                currentTelemetryValues = data.metricas.map(m => {
                    return {
                        label: m.label,
                        baseValue: m.value,
                        currentValue: m.value,
                        variacion: m.variacion || 0,
                        unit: m.unit,
                        precision: m.precision !== undefined ? m.precision : 2,
                        static: m.static || false
                    };
                });

                // Renderizar inicialmente las métricas en el DOM
                renderMetrics(data.accent);

                // Si hay métricas dinámicas, arrancar el temporizador de fluctuación (telemetría viva)
                const hasDynamic = currentTelemetryValues.some(m => !m.static);
                if (hasDynamic) {
                    telemetryInterval = setInterval(() => {
                        currentTelemetryValues.forEach((m, idx) => {
                            if (!m.static) {
                                // Fluctuación técnica realista (caminata aleatoria controlada)
                                const shift = (Math.random() - 0.5) * m.variacion * 2;
                                m.currentValue = m.baseValue + shift;
                                
                                // Actualizar en el DOM de forma fluida
                                const valueEl = document.getElementById(`metric-val-${idx}`);
                                if (valueEl) {
                                    valueEl.textContent = m.currentValue.toFixed(m.precision);
                                }
                            }
                        });
                    }, 1200); // Variación cada 1.2 segundos
                }

                // Renderizar y arrancar los gráficos animados SVG en caliente
                renderAndAnimateGraph(data.grafico, data.accent);
            }

            function renderMetrics(accentColor) {
                scadaMetricsContainer.innerHTML = '';
                currentTelemetryValues.forEach((m, idx) => {
                    const card = document.createElement('div');
                    card.className = 'metric-card';
                    card.style.setProperty('--accent-color', accentColor);

                    const label = document.createElement('span');
                    label.className = 'metric-label';
                    label.textContent = m.label;

                    const valContainer = document.createElement('div');
                    valContainer.className = 'metric-value-container';

                    const value = document.createElement('span');
                    value.className = 'metric-value';
                    value.id = `metric-val-${idx}`;
                    
                    if (m.static) {
                        value.textContent = m.baseValue;
                    } else {
                        value.textContent = m.baseValue.toFixed(m.precision);
                    }

                    const unit = document.createElement('span');
                    unit.className = 'metric-unit';
                    unit.style.color = accentColor;
                    unit.textContent = m.unit;

                    valContainer.appendChild(value);
                    valContainer.appendChild(unit);
                    card.appendChild(label);
                    card.appendChild(valContainer);
                    scadaMetricsContainer.appendChild(card);
                });
            }

            // ============================================================
            // 📈 GRÁFICOS SVG ANIMADOS DE ALTO RENDIMIENTO (EN CALIENTE)
            // ============================================================
            function renderAndAnimateGraph(type, accentColor) {
                scadaVisualizer.innerHTML = '';
                
                if (type === 'radar') {
                    // Círculo de escaneo radar de alta tecnología
                    scadaVisualizer.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 100 100" style="background:#02050b;">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.3"/>
                            <circle cx="50" cy="50" r="30" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.2"/>
                            <circle cx="50" cy="50" r="15" fill="none" stroke="${accentColor}" stroke-width="0.5" opacity="0.1"/>
                            <line x1="5" y1="50" x2="95" y2="50" stroke="${accentColor}" stroke-width="0.5" opacity="0.2"/>
                            <line x1="50" y1="5" x2="50" y2="95" stroke="${accentColor}" stroke-width="0.5" opacity="0.2"/>
                            <line id="radarSweep" x1="50" y1="50" x2="85" y2="15" stroke="${accentColor}" stroke-width="1.5"/>
                            <circle cx="50" cy="50" r="2" fill="${accentColor}"/>
                        </svg>
                    `;
                    let angle = 0;
                    const line = document.getElementById('radarSweep');
                    function sweep() {
                        angle = (angle + 1.5) % 360;
                        const rad = (angle * Math.PI) / 180;
                        const x = 50 + 40 * Math.cos(rad);
                        const y = 50 + 40 * Math.sin(rad);
                        line.setAttribute('x2', x);
                        line.setAttribute('y2', y);
                        animationFrameId = requestAnimationFrame(sweep);
                    }
                    sweep();

                } else if (type === 'solar' || type === 'solar_waves') {
                    // Onda de oscilación de potencia fotovoltaica (C.A.)
                    scadaVisualizer.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 100 50" style="background:#02050b;">
                            <path id="wavePath" fill="none" stroke="${accentColor}" stroke-width="1.5" d=""/>
                            <line x1="0" y1="25" x2="100" y2="25" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                        </svg>
                    `;
                    const path = document.getElementById('wavePath');
                    let offset = 0;
                    function animateWave() {
                        offset += 0.08;
                        let points = [];
                        const amp = type === 'solar_waves' ? 12 : 5;
                        for (let x = 0; x <= 100; x += 2) {
                            const y = 25 + amp * Math.sin((x * 0.15) - offset);
                            points.push(`${x},${y}`);
                        }
                        path.setAttribute('d', `M ${points.join(' L ')}`);
                        animationFrameId = requestAnimationFrame(animateWave);
                    }
                    animateWave();

                } else if (type === 'hidro' || type === 'hidro_gauge') {
                    // Tacómetro o indicador rotativo circular de presión/RPM
                    scadaVisualizer.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 100 100" style="background:#02050b;">
                            <path d="M 20 80 A 40 40 0 1 1 80 80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" stroke-linecap="round"/>
                            <path id="gaugeArc" d="M 20 80 A 40 40 0 0 1 80 80" fill="none" stroke="${accentColor}" stroke-width="8" stroke-linecap="round" stroke-dasharray="188" stroke-dashoffset="188"/>
                            <line id="gaugeNeedle" x1="50" y1="50" x2="50" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="50" cy="50" r="5" fill="${accentColor}"/>
                        </svg>
                    `;
                    const arc = document.getElementById('gaugeArc');
                    const needle = document.getElementById('gaugeNeedle');
                    
                    function animateGauge() {
                        const pressureVal = currentTelemetryValues[1] ? currentTelemetryValues[1].currentValue : 1.9;
                        const percent = (pressureVal - 1.5) / 1.0;
                        const limitedPercent = Math.max(0, Math.min(1, percent));
                        
                        const angle = -135 + limitedPercent * 270;
                        needle.setAttribute('transform', `rotate(${angle} 50 50)`);
                        
                        const offset = 188 - (188 * limitedPercent * 0.75);
                        arc.setAttribute('stroke-dashoffset', offset);
                        
                        animationFrameId = requestAnimationFrame(animateGauge);
                    }
                    animateGauge();

                } else if (type === 'eolica' || type === 'eolica_waves') {
                    // Ondas de flujo de aire del Efecto Venturi
                    scadaVisualizer.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 100 50" style="background:#02050b;">
                            <path id="windLine1" fill="none" stroke="${accentColor}" stroke-width="1.2" opacity="0.8" d=""/>
                            <path id="windLine2" fill="none" stroke="${accentColor}" stroke-width="0.8" opacity="0.5" d=""/>
                            <path id="windLine3" fill="none" stroke="${accentColor}" stroke-width="1" opacity="0.6" d=""/>
                        </svg>
                    `;
                    const l1 = document.getElementById('windLine1');
                    const l2 = document.getElementById('windLine2');
                    const l3 = document.getElementById('windLine3');
                    let t = 0;
                    
                    function animateWind() {
                        t += 0.12;
                        const windSpeed = currentTelemetryValues[1] ? currentTelemetryValues[1].currentValue : 6.4;
                        const speedFactor = windSpeed * 0.015;
                        
                        let p1 = [], p2 = [], p3 = [];
                        for (let x = 0; x <= 100; x += 4) {
                            const y1 = 15 + 4 * Math.sin((x * 0.1) - t * speedFactor * 1.5);
                            const y2 = 25 + 2 * Math.cos((x * 0.08) - t * speedFactor * 1.2);
                            const y3 = 35 + 3 * Math.sin((x * 0.12) - t * speedFactor * 1.8);
                            p1.push(`${x},${y1}`);
                            p2.push(`${x},${y2}`);
                            p3.push(`${x},${y3}`);
                        }
                        l1.setAttribute('d', `M ${p1.join(' L ')}`);
                        l2.setAttribute('d', `M ${p2.join(' L ')}`);
                        l3.setAttribute('d', `M ${p3.join(' L ')}`);
                        animationFrameId = requestAnimationFrame(animateWind);
                    }
                    animateWind();

                } else if (type === 'maqueta' || type === 'maqueta_detail' || type === 'maqueta_dron' || type === 'maqueta_sensors') {
                    // Ecualizador de tres barras de sensores de confort (Temp, Hum, CO2)
                    scadaVisualizer.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 120 60" style="background:#02050b;">
                            <rect x="20" y="10" width="16" height="40" rx="2" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                            <rect x="52" y="10" width="16" height="40" rx="2" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                            <rect x="84" y="10" width="16" height="40" rx="2" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
                            
                            <rect id="sensorBar1" x="20" y="25" width="16" height="25" rx="2" fill="#86efac"/>
                            <rect id="sensorBar2" x="52" y="20" width="16" height="30" rx="2" fill="#00d2dc"/>
                            <rect id="sensorBar3" x="84" y="30" width="16" height="20" rx="2" fill="#ff7849"/>
                            
                            <text x="28" y="56" fill="rgba(255,255,255,0.4)" font-size="5" text-anchor="middle" font-weight="600">TEMP</text>
                            <text x="60" y="56" fill="rgba(255,255,255,0.4)" font-size="5" text-anchor="middle" font-weight="600">HUM</text>
                            <text x="92" y="56" fill="rgba(255,255,255,0.4)" font-size="5" text-anchor="middle" font-weight="600">CO2</text>
                        </svg>
                    `;
                    const b1 = document.getElementById('sensorBar1');
                    const b2 = document.getElementById('sensorBar2');
                    const b3 = document.getElementById('sensorBar3');
                    
                    function animateBars() {
                        let tVal = 19.4, hVal = 54.8, cVal = 382;
                        
                        if (currentTelemetryValues[0] && !currentTelemetryValues[0].static) {
                            tVal = currentTelemetryValues[0].currentValue;
                            hVal = currentTelemetryValues[1].currentValue;
                            cVal = currentTelemetryValues[2].currentValue;
                        }
                        
                        const tPercent = Math.max(0, Math.min(1, (tVal - 15) / 10));
                        const hPercent = Math.max(0, Math.min(1, (hVal - 40) / 30));
                        const cPercent = Math.max(0, Math.min(1, (cVal - 300) / 200));
                        
                        const h1 = tPercent * 36;
                        b1.setAttribute('height', h1);
                        b1.setAttribute('y', 50 - h1);
                        
                        const h2 = hPercent * 36;
                        b2.setAttribute('height', h2);
                        b2.setAttribute('y', 50 - h2);
                        
                        const h3 = cPercent * 36;
                        b3.setAttribute('height', h3);
                        b3.setAttribute('y', 50 - h3);
                        
                        animationFrameId = requestAnimationFrame(animateBars);
                    }
                    animateBars();
                }
            }

            // ============================================================
            // 🕹️ LÓGICA DE CONTROL (PLAY / PAUSA / PANTALLA COMPLETA)
            // ============================================================
            function togglePlay() {
                if (activePlayer.paused) {
                    activePlayer.play().then(() => {
                        playOverlay.classList.remove('visible');
                        showStatusIndicator('BUCLE REANUDADO');
                    });
                } else {
                    activePlayer.pause();
                    showStatusIndicator('PAUSADO (BUCLE DETENIDO)');
                }
            }

            function showStatusIndicator(text) {
                clearTimeout(statusTimeout);
                statusIndicator.textContent = text;
                statusIndicator.classList.add('visible');
                
                statusTimeout = setTimeout(() => {
                    statusIndicator.classList.remove('visible');
                }, 1500);
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }

            // Ocultar / Mostrar HUD SCADA
            function toggleHud() {
                const scadaPanel = document.querySelector('.scada-panel');
                if (scadaPanel && hudToggleBtn) {
                    const isHidden = scadaPanel.classList.toggle('hidden');
                    hudToggleBtn.classList.toggle('active', !isHidden);
                    
                    const eyeIcon = hudToggleBtn.querySelector('.eye-icon');
                    const eyeOffIcon = hudToggleBtn.querySelector('.eye-off-icon');
                    if (isHidden) {
                        eyeIcon.style.display = 'none';
                        eyeOffIcon.style.display = 'block';
                        showStatusIndicator('HUD OCULTO');
                    } else {
                        eyeIcon.style.display = 'block';
                        eyeOffIcon.style.display = 'none';
                        showStatusIndicator('HUD ACTIVO');
                    }
                }
            }

            // ============================================================
            // ⌨️ ASIGNACIÓN DE EVENTOS (TECLADO & RATÓN)
            // ============================================================

            // Evento de alternancia del HUD por botón
            hudToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleHud();
            });

            // Clic en el video avanza diapositiva manualmente si se quiere omitir en el bucle
            container.addEventListener('click', (e) => {
                if (e.target.closest('#overlayPlayBtn') || playOverlay.classList.contains('visible') || e.target.closest('.scada-panel') || e.target.closest('.hud-toggle-btn')) return;
                
                const nextSlide = (currentSlide < totalSlides - 1) ? (currentSlide + 1) : 0;
                goToSlide(nextSlide);
            });

            // Doble clic en cualquier parte (excepto panel o botón) activa pantalla completa
            container.addEventListener('dblclick', (e) => {
                if (e.target.closest('#overlayPlayBtn') || e.target.closest('.scada-panel') || e.target.closest('.hud-toggle-btn')) return;
                toggleFullscreen();
            });

            overlayPlayBtn.addEventListener('click', () => {
                playOverlay.classList.remove('visible');
                activePlayer.play();
            });

            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowRight':
                    case 'PageDown':
                        e.preventDefault();
                        const nextSlide = (currentSlide < totalSlides - 1) ? (currentSlide + 1) : 0;
                        goToSlide(nextSlide);
                        break;
                    case 'ArrowLeft':
                    case 'PageUp':
                        e.preventDefault();
                        const prevSlide = (currentSlide > 0) ? (currentSlide - 1) : (totalSlides - 1);
                        goToSlide(prevSlide);
                        break;
                    case ' ':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'f':
                    case 'F':
                        toggleFullscreen();
                        break;
                    case 'h':
                    case 'H':
                        e.preventDefault();
                        toggleHud();
                        break;
                }
            });

            // ============================================================
            // 🖱  OCULTACIÓN AUTOMÁTICA DEL CURSOR DEL RATÓN
            // ============================================================
            let mouseTimer;
            
            function hideMouseCursor() {
                document.body.classList.add('hide-cursor');
            }

            // Ocultar el cursor después de 2 segundos de inactividad
            function resetMouseTimer() {
                document.body.classList.remove('hide-cursor');
                clearTimeout(mouseTimer);
                mouseTimer = setTimeout(hideMouseCursor, 2000);
            }

            window.addEventListener('mousemove', resetMouseTimer);
            window.addEventListener('mousedown', resetMouseTimer);
            window.addEventListener('keydown', resetMouseTimer);
            resetMouseTimer();

            // ============================================================
            // 🚀 INICIAR BUCLE AUTOMÁTICO E INICIALIZAR PANEL SCADA
            // ============================================================
            goToSlide(0);
        });
    </script>
</body>
</html>
